name: Bouw Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Broncode ophalen
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Packages installeren
        run: pip install cryptography pyinstaller

      - name: EXE bouwen
        run: pyinstaller --onefile --windowed --name "Wachtwoordmanager" --icon "wachtwoordmanager.ico" wachtwoordmanager.py

      - name: EXE uploaden als artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wachtwoordmanager-Windows
          path: dist/Wachtwoordmanager.exe
